<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hars Coffee Menu - Yönlendiriliyor...</title>
    <meta http-equiv="refresh" content="0;url=/">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fed7aa 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #92400e;
        }
        .redirect-container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 1rem;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #f59e0b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #92400e;
        }
        .message {
            margin-bottom: 1rem;
            color: #6b7280;
        }
        .link {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="logo">☕ Hars Coffee</div>
        <div class="spinner"></div>
        <div class="message">Ana sayfaya yönlendiriliyorsunuz...</div>
        <div class="message">
            Otomatik yönlendirme çalışmazsa 
            <a href="/" class="link">buraya tıklayın</a>
        </div>
    </div>
    
    <script>
        // Hemen yönlendir
        window.location.href = '/';
        
        // 3 saniye sonra da yönlendir (fallback)
        setTimeout(function() {
            window.location.href = '/';
        }, 3000);
    </script>
</body>
</html>
